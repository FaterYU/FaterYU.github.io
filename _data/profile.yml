publications:
  - venue: "ICML 2026 · Spotlight"
    title: "Position: Assistive Agents Need Accessibility Alignment"
    description: "A position paper on aligning assistive agents with accessibility needs, human context, and real-world deployment constraints."
    page_description: "Assistive agents should be evaluated and aligned around accessibility needs rather than generic task completion alone."
    image: "/images/publications/assistive-agents-alignment.png"
    image_alt: "Task-centric taxonomy of blind assistance and assistive task distribution"
    featured: true
    links:
      - label: "Paper"
        url: "https://arxiv.org/abs/2605.13579"
  - venue: "arXiv"
    title: "DEAF: A Benchmark for Diagnostic Evaluation of Acoustic Faithfulness in Audio Language Models"
    description: "A diagnostic benchmark for evaluating whether audio language models preserve acoustic evidence faithfully."
    page_description: "A benchmark for diagnosing whether audio language models ground their answers in faithful acoustic evidence."
    image: "/images/publications/deaf-overview.png"
    image_alt: "Overview of the DEAF acoustic faithfulness benchmark framework"
    links:
      - label: "Paper"
        url: "https://arxiv.org/abs/2603.18048"
  - venue: "arXiv"
    title: "OccSTeP: Benchmarking 4D Occupancy Spatio-Temporal Persistence"
    description: "A benchmark for studying how occupancy representations persist across space and time in dynamic 4D scenes."
    page_description: "A benchmark for evaluating how 4D occupancy methods preserve spatio-temporal consistency in dynamic scenes."
    image: "/images/publications/occstep-overview.png"
    image_alt: "Overview figure for OccSTeP spatio-temporal persistence benchmark"
    links:
      - label: "Paper"
        url: "https://arxiv.org/abs/2512.15621"
      - label: "Website"
        url: "https://insai-lab.github.io/OccSTeP.github.io/"
